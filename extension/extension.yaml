name: custom:cisco-intersight
version: 1.0.5
minDynatraceVersion: "1.335.0"
author:
  name: "Cisco-Dev"

python:
  runtime:
    module: cisco_intersight
    version:
      min: "3.10"
  activation:
    remote:
      path: activationSchema.json
    local:
      path: activationSchema.json

metrics:
  - key: intersight.heartbeat
    metadata:
      displayName: Intersight Domain Heartbeat
      unit: Count

topology:
  types:
    - name: cisco:intersight_domain
      displayName: Cisco Intersight Account
      rules:
        - idPattern: cisco_intersight_{account_moid}
          instanceNamePattern: "{account_name}"
          sources:
            - sourceType: Metrics
              condition: $prefix(intersight.)
          attributes:
            - pattern: "{account_moid}"
              key: account_moid
              displayName: Intersight Account MOID
            - pattern: "{account_name}"
              key: account_name
              displayName: Intersight Account
            - pattern: "{host}"
              key: host
              displayName: Intersight Host
  relationships: []
