name: custom:cisco-intersight
version: 1.2.7
minDynatraceVersion: "1.280.0"
author:
  name: Cisco Dev

python:
  runtime:
    module: cisco_intersight
    version:
      min: "3.10"
  activation:
    remote:
      path: activationSchema.json
    local:
      path: activationSchema.json

metrics:
  - key: intersight.heartbeat
    metadata:
      displayName: Cisco Intersight Heartbeat
      description: Liveness signal used as topology source
      unit: Count

topology:
  types:
    - name: cisco:intersight_domain
      displayName: Cisco Intersight Domain
      enabled: true
      rules:
        - idPattern: cisco_intersight_{account_moid}
          instanceNamePattern: "{account_name}"
          sources:
            - sourceType: Metrics
              condition: $eq(intersight.heartbeat)
          requiredDimensions:
            - key: account_moid
            - key: account_name
          attributes:
            - key: account_moid
              displayName: Account MOID
              pattern: "{account_moid}"
            - key: account_name
              displayName: Account Name
              pattern: "{account_name}"
            - key: host
              displayName: Intersight Host
              pattern: "{host}"
